{{- if .Values.azure.secretProviderClass.enabled -}}

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-secret-provider-montandon-eoapi
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: {{ required "azure.clientID" .Values.azure.clientID }}
    tenantId: {{ required "azure.tenantId" .Values.azure.tenantId }}
    keyvaultName: {{ required "azure.secretProviderClass.keyvaultName" .Values.azure.secretProviderClass.keyvaultName }}
    objects: |
      array:
        - |
          objectName: DB-PASSWORD
          objectType: secret
        - |
          objectName: DB-HOST
          objectType: secret
        - |
          objectName: DB-NAME
          objectType: secret
        - |
          objectName: DB-USER
          objectType: secret
        - |
          objectName: DB-PORT
          objectType: secret
  secretObjects:
    - secretName: pgstac-secrets-montandon-eoapi
      type: Opaque
      data:
        - objectName: DB-PASSWORD
          key: POSTGRES_PASSWORD
        - objectName: DB-PASSWORD
          key: PGPASSWORD
        - objectName: DB-HOST
          key: POSTGRES_HOST
        - objectName: DB-HOST
          key: POSTGRES_HOST_READER
        - objectName: DB-HOST
          key: POSTGRES_HOST_WRITER
        - objectName: DB-HOST
          key: POSTGRES_HOST
        - objectName: DB-NAME
          key: POSTGRES_DB
        - objectName: DB-NAME
          key: PGDATABASE
        - objectName: DB-PASSWORD
          key: POSTGRES_PASS
        - objectName: DB-PASSWORD
          key: DB_PASSWORD
        - objectName: DB-HOST
          key: DB_HOST
        - objectName: DB-NAME
          key: DB_NAME
        - objectName: DB-PASSWORD
          key: pgpassword
        - objectName: DB-HOST
          key: pghost
        - objectName: DB-NAME
          key: dbname
        - objectName: DB-USER
          key: POSTGRES_USER
        - objectName: DB-USER
          key: username
        - objectName: DB-USER
          key: DB_USER
        - objectName: DB-PORT
          key: DB_PORT
        - objectName: DB-PORT
          key: port

{{- end }}
